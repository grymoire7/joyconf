app = 'speechwave'
primary_region = 'ord'
console_command = '/app/bin/speechwave remote'

[build]

[env]
  PHX_HOST = 'speechwave.live'
  PORT = '8080'
  DATABASE_PATH = '/data/speechwave.db'
  POOL_SIZE = '2'
  ERL_FLAGS = '+MBas aobf +MHas aobf'

[[mounts]]
  source = 'speechwave_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
